<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AirTraveler's Book</title>
    <link rel="icon" type="image/png" sizes="512x512" href="img/airplane.png?v=2" />
    <link rel="shortcut icon" type="image/png" href="img/airplane.png?v=2" />
    <link rel="apple-touch-icon" href="img/airplane.png?v=2" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="home-page">
    <nav class="site-nav">
      <div class="brand">AirTraveler's Book</div>
    </nav>
    <header class="hero" id="top">
      <div class="hero-content">
        <p class="eyebrow">Aircraft Guide</p>
        <h1>飛機圖鑑</h1>
        <p>這裡是航空公司和機型的介紹</p>
        <div class="search-panel" aria-label="搜尋與篩選機型">
          <div class="filter-row filter-row-inline">
            <div class="filter-field">
              <label for="airlineFilter">航空公司</label>
              <select id="airlineFilter">
                <option value="">所有航空公司</option>
              </select>
            </div>
            <div class="filter-field">
              <label for="modelFilter">機型</label>
              <select id="modelFilter">
                <option value="">所有機型</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </header>
    <main>
      <section class="fleet-section" id="fleet">
        <div class="fleet-spacer" aria-hidden="true"></div>
        <div class="detail-layout">
          <aside class="detail-sidebar">
            <h2>航空公司</h2>
            <ul id="airlineSidebar"></ul>
            <div class="sidebar-note">
              <p>座位圖與建議皆為示意，實際配置依航空公司為準。</p>
            </div>
          </aside>
          <div class="detail-content" id="airlineDetails"></div>
        </div>
      </section>
    </main>
    <footer class="site-footer">
      <div class="footer-inner">
        <p class="footer-brand">AirTraveler's Book</p>
        <p>航空公司與機型資料整理，實際配置請以航空公司公告為準。</p>
      </div>
    </footer>
    <script src="assets/js/script.js"></script>
  </body>
</html>
