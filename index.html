<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AirTraveler's Book</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="home-page">
    <nav class="site-nav">
      <div class="brand">AirTraveler's Book</div>
    </nav>
    <header class="hero" id="top">
      <div class="hero-content">
        <p class="eyebrow">Seat Map Library</p>
        <h1>這裡是可以帶著走的飛機圖鑑</h1>
        <p>沒有使用一架飛機不能解決的煩惱。如果真的有，那就使用兩架。</p>
        <div class="search-panel" aria-label="搜尋與篩選機型">
          <label class="sr-only" for="airlineInput">航空公司</label>
          <input
            id="airlineInput"
            type="search"
            placeholder="輸入航空公司（例如：長榮、華航、SIA）"
            list="airlinesData"
          />
          <label class="sr-only" for="manufacturerFilter">製造商</label>
          <select id="manufacturerFilter">
            <option value="">選擇波音或空巴</option>
            <option value="airbus">空中巴士 Airbus</option>
            <option value="boeing">波音 Boeing</option>
          </select>
          <label class="sr-only" for="modelFilter">機型</label>
          <select id="modelFilter" disabled>
            <option value="">請先選製造商</option>
          </select>
          <button type="button">搜尋</button>
        </div>
        <datalist id="airlinesData"></datalist>
      </div>
    </header>
    <main>
      <section class="fleet-section" id="fleet">
        <header class="fleet-header">
          <p class="eyebrow">Fleet Spotlight</p>
          <h2>TOP AIRLINES AND THEIR FLEETS</h2>
          <p>全球頂尖航空公司與機隊一覽</p>
        </header>
        <div class="detail-layout">
          <aside class="detail-sidebar">
            <h2>航空公司</h2>
            <ul id="airlineSidebar"></ul>
            <div class="sidebar-note">
              <p>座位圖與建議皆為示意，實際配置依航空公司為準。</p>
            </div>
          </aside>
          <div class="detail-content" id="airlineDetails"></div>
        </div>
      </section>
    </main>
    <script src="data.js"></script>
    <script>
      const manufacturerFilter = document.getElementById("manufacturerFilter");
      const modelFilter = document.getElementById("modelFilter");
      const airlineDatalist = document.getElementById("airlinesData");
      const sidebarList = document.getElementById("airlineSidebar");
      const detailContainer = document.getElementById("airlineDetails");
      const modelOptions = {
        airbus: [
          { value: "a350", label: "Airbus A350-900" },
          { value: "a321neo", label: "Airbus A321neo LR" },
        ],
        boeing: [
          { value: "b7810", label: "Boeing 787-10" },
          { value: "b773er", label: "Boeing 777-300ER" },
        ],
      };

      const airlines = Array.isArray(window.airlineData) ? window.airlineData : [];

      const buildSpecList = (specs = []) =>
        (specs || [])
          .map((spec) => `<li><strong>${spec.label}</strong>${spec.value}</li>`)
          .join("");

      const buildModelCards = (models = []) =>
        (models || [])
          .map(
            (model) => `
              <section class="model-card">
                <h3>${model.title}</h3>
                <p class="model-role">${model.role}</p>
                <ul class="model-specs">
                  ${buildSpecList(model.specs)}
                </ul>
              </section>
            `,
          )
          .join("");

      if (detailContainer) {
        detailContainer.innerHTML = airlines
          .map(
            (airline) => `
              <article class="aircraft-card airline-article" id="${airline.id}">
                <header>
                  <div>
                    <p class="aircraft-code">${airline.code}</p>
                    <h2>${airline.displayName}</h2>
                    <p class="family">${airline.family}</p>
                  </div>
                  <span class="tag">${airline.tag}</span>
                </header>
                <p class="aircraft-summary">${airline.summary}</p>
                <div class="model-grid">
                  ${buildModelCards(airline.models)}
                </div>
              </article>
            `,
          )
          .join("");
      }

      if (sidebarList) {
        sidebarList.innerHTML = "";
        airlines.forEach((airline) => {
          const li = document.createElement("li");
          const link = document.createElement("a");
          link.href = `#${airline.id}`;
          link.textContent = airline.displayName;
          li.appendChild(link);
          sidebarList.appendChild(li);
        });
      }

      if (airlineDatalist) {
        const datalistValues = new Set();
        airlines.forEach((airline) => {
          if (airline.shortName) datalistValues.add(airline.shortName);
          if (airline.englishName) datalistValues.add(airline.englishName);
          (airline.aliases || []).forEach((alias) => datalistValues.add(alias));
        });
        airlineDatalist.innerHTML = "";
        datalistValues.forEach((name) => {
          const option = document.createElement("option");
          option.value = name;
          airlineDatalist.appendChild(option);
        });
      }

      manufacturerFilter.addEventListener("change", () => {
        const choice = manufacturerFilter.value;
        modelFilter.innerHTML = "";
        if (!choice || !modelOptions[choice]) {
          modelFilter.disabled = true;
          modelFilter.insertAdjacentHTML(
            "beforeend",
            '<option value="">請先選製造商</option>'
          );
          return;
        }
        modelFilter.disabled = false;
        modelOptions[choice].forEach((option) => {
          const opt = document.createElement("option");
          opt.value = option.value;
          opt.textContent = option.label;
          modelFilter.appendChild(opt);
        });
      });
    </script>
  </body>
</html>
