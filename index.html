<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AirTraveler's Book</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="home-page">
    <nav class="site-nav">
      <div class="brand">AirTraveler's Book</div>
    </nav>
    <header class="hero" id="top">
      <div class="hero-content">
        <p class="eyebrow">Seat Map Library</p>
        <h1>飛機圖鑑</h1>
        <p>這裡是航空公司和機型的介紹</p>
        <div class="search-panel" aria-label="搜尋與篩選機型">
          <div class="filter-row filter-row-inline">
            <div class="filter-field">
              <label for="airlineInput">航空公司</label>
              <input
                id="airlineInput"
                type="search"
                placeholder="輸入航空公司，例如：長榮"
                list="airlinesData"
              />
            </div>
            <div class="filter-field">
              <label for="manufacturerFilter">製造商</label>
              <input
                id="manufacturerFilter"
                type="search"
                placeholder="輸入製造商，例如：空巴、波音"
                list="manufacturerData"
              />
            </div>
            <div class="filter-field">
              <label for="modelFilter">機型</label>
              <select id="modelFilter" disabled>
                <option value="">請先選製造商</option>
              </select>
            </div>
            <div class="filter-actions">
              <button type="button">搜尋</button>
            </div>
          </div>
        </div>
        <datalist id="airlinesData"></datalist>
        <datalist id="manufacturerData">
          <option value="空巴"></option>
          <option value="波音"></option>
        </datalist>
      </div>
    </header>
    <main>
      <section class="fleet-section" id="fleet">
        <div class="fleet-spacer" aria-hidden="true"></div>
        <div class="detail-layout">
          <aside class="detail-sidebar">
            <h2>航空公司</h2>
            <ul id="airlineSidebar"></ul>
            <div class="sidebar-note">
              <p>座位圖與建議皆為示意，實際配置依航空公司為準。</p>
            </div>
          </aside>
          <div class="detail-content" id="airlineDetails"></div>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
